version: "3.9"

services:

  fl-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bft_fl_server
    command: python experiments/run_experiments.py --dataset mnist --rounds 30 --num-clients 10
    volumes:
      - ../results:/app/results
      - ../data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - FL_ROLE=server
    ports:
      - "50051:50051"
    networks:
      - fl-network

  fl-dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bft_fl_dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ../results:/app/results
    ports:
      - "8501:8501"
    depends_on:
      - fl-server
    networks:
      - fl-network

networks:
  fl-network:
    driver: bridge

volumes:
  results:
  data:
